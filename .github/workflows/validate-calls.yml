name: Validate Calls

on:
  push:
  pull_request:

jobs:
  validate-calls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate calls data
        run: python tools/validate_calls.py
