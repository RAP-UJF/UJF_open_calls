<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UJF Open Calls</title>
  <meta
    name="description"
    content="Public overview of research funding calls relevant for the Nuclear Physics Institute of the Czech Academy of Sciences."
  >
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <div class="header-hero">
        <img src="asset/header.jpg" alt="Visual summary of current funding calls and timing" class="header-image">
      </div>
      <p class="eyebrow">Funding opportunities</p>
      <h1>UJF Open Calls</h1>
      <p class="intro">
        A lightweight public list of funding calls relevant for nuclear physics, radiation science,
        materials research, mobility, and applied collaboration at UJF.
      </p>
    </header>

    <main>
      <section class="status-panel" aria-live="polite">
        <p id="loading-state">Loading calls...</p>
      </section>
      <section id="calls-container" class="cards-grid" aria-label="Funding calls"></section>
    </main>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
